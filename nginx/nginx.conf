# =============================================================================
# CARSI LMS — Nginx Reverse Proxy Configuration
# SSL termination, rate limiting, security headers, gzip compression
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

upstream web_upstream {
    server web:3000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # -------------------------------------------------------------------------
    # SSL Configuration
    # -------------------------------------------------------------------------
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # -------------------------------------------------------------------------
    # Proxy defaults
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # -------------------------------------------------------------------------
    # Backend API routes
    # -------------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass http://backend_upstream;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/login {
        limit_req zone=login burst=3 nodelay;

        proxy_pass http://backend_upstream;
        proxy_read_timeout 30s;
    }

    # Backend health check (no rate limit)
    location /health {
        proxy_pass http://backend_upstream;
    }

    # -------------------------------------------------------------------------
    # Next.js frontend (everything else)
    # -------------------------------------------------------------------------
    location / {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://web_upstream;
        proxy_read_timeout 30s;
    }

    # Next.js static assets — long cache, no rate limit
    location /_next/static/ {
        proxy_pass http://web_upstream;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Public assets
    location /public/ {
        proxy_pass http://web_upstream;
        expires 30d;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------------------------------
    # Error pages
    # -------------------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
