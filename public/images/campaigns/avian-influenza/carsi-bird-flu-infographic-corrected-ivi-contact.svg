<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Australian H5 bird flu readiness infographic for CARSI</title>
  <desc id="desc">A calm evidence-led CARSI infographic with public reporting advice, professional restoration protocol, readiness training modules, Halosil dry-fogging compliance boundaries and Ivi Sims contact details.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f2f4f"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#eaf6ff" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#061525" flood-opacity="0.25"/>
    </filter>
    <style>
      .heading{font-family:Arial,Helvetica,sans-serif;font-weight:800;letter-spacing:-1px;fill:#fff}
      .sub{font-family:Arial,Helvetica,sans-serif;font-weight:600;fill:#d9f3ff}
      .panelTitle{font-family:Arial,Helvetica,sans-serif;font-weight:800;fill:#0b2742}
      .body{font-family:Arial,Helvetica,sans-serif;font-size:24px;fill:#16324a}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:19px;fill:#36546d}
      .whiteSmall{font-family:Arial,Helvetica,sans-serif;font-size:22px;fill:#eaffff}
      .tick{font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:800;fill:#0f766e}
      .badge{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:800;fill:#07324a}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1390" cy="145" r="190" fill="#ffffff" opacity="0.08"/>
  <circle cx="118" cy="820" r="250" fill="#ffffff" opacity="0.07"/>
  <text x="72" y="94" class="heading" font-size="58">Australian H5 Bird Flu Readiness</text>
  <text x="74" y="142" class="sub" font-size="27">Calm. Evidence-led. Professional. Australian Government wording first.</text>
  <text x="74" y="188" class="whiteSmall">Current official position: wild-bird detections, no evidence of poultry or agricultural spread, and low current human-health risk.</text>
  <g transform="translate(72 230)" filter="url(#shadow)">
    <rect width="450" height="260" rx="28" fill="#fff4dc"/>
    <text x="34" y="52" class="panelTitle" font-size="32">Public protocol</text>
    <text x="34" y="92" class="body">If you find sick or dead birds:</text>
    <text x="34" y="135" class="tick">✓</text><text x="78" y="135" class="body">Do not touch or collect</text>
    <text x="34" y="176" class="tick">✓</text><text x="78" y="176" class="body">Keep people and pets away</text>
    <text x="34" y="217" class="tick">✓</text><text x="78" y="217" class="body">Record the location</text>
    <text x="34" y="250" class="small">Take photos only if safe.</text>
  </g>
  <g transform="translate(550 230)" filter="url(#shadow)">
    <rect width="472" height="260" rx="28" fill="url(#panel)"/>
    <text x="34" y="52" class="panelTitle" font-size="32">Report first</text>
    <text x="34" y="96" class="body">Emergency Animal Disease Hotline</text>
    <text x="34" y="168" font-family="Arial,Helvetica,sans-serif" font-size="58" font-weight="900" fill="#0f766e">1800 675 888</text>
    <text x="34" y="214" class="small">24/7 Australia-wide reporting pathway.</text>
  </g>
  <g transform="translate(1050 230)" filter="url(#shadow)">
    <rect width="478" height="260" rx="28" fill="url(#panel)"/>
    <text x="34" y="52" class="panelTitle" font-size="32">Professional protocol</text>
    <text x="34" y="96" class="tick">✓</text><text x="78" y="96" class="body">Authority first</text>
    <text x="34" y="137" class="tick">✓</text><text x="78" y="137" class="body">WHS, PPE and zones</text>
    <text x="34" y="178" class="tick">✓</text><text x="78" y="178" class="body">Clean before disinfection</text>
    <text x="34" y="219" class="tick">✓</text><text x="78" y="219" class="body">Document everything</text>
  </g>
  <g transform="translate(72 530)" filter="url(#shadow)">
    <rect width="956" height="246" rx="28" fill="url(#panel)"/>
    <text x="34" y="50" class="panelTitle" font-size="32">CARSI readiness training modules</text>
    <text x="34" y="94" class="body">• H5 awareness and official reporting</text>
    <text x="34" y="132" class="body">• WHS, PPE, exposure controls and clean/dirty zones</text>
    <text x="34" y="170" class="body">• AUSVETPLAN-aligned cleaning and decontamination principles</text>
    <text x="34" y="208" class="body">• RestoreAssist.app field documentation and completion records</text>
  </g>
  <g transform="translate(1058 530)" filter="url(#shadow)">
    <rect width="470" height="246" rx="28" fill="#e8fbf7"/>
    <text x="34" y="50" class="panelTitle" font-size="32">Product boundary</text>
    <text x="34" y="94" class="body">Halosil / HaloFogger</text>
    <text x="34" y="128" class="small">Clean first. Fog second. Verify third.</text>
    <text x="34" y="166" class="small">Use only under label, SDS, risk assessment,</text>
    <text x="34" y="192" class="small">Australian regulatory review and authority</text>
    <text x="34" y="218" class="small">directions where required.</text>
  </g>
  <g transform="translate(72 805)">
    <rect width="1456" height="58" rx="20" fill="#07243a" opacity="0.92"/>
    <text x="32" y="38" class="whiteSmall">Ivi Sims — CARSI avian-influenza readiness point of contact · 1300 654 684 · linkedin.com/in/ivi-sims-4940b833/ · carsi.com.au/contact</text>
  </g>
  <g transform="translate(1338 70)">
    <circle cx="66" cy="66" r="66" fill="#ffffff" opacity="0.96"/>
    <text x="66" y="77" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="900" fill="#0f766e">IS</text>
    <text x="66" y="158" text-anchor="middle" class="badge">no false portrait</text>
  </g>
</svg>
