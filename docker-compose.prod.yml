# =============================================================================
# CARSI LMS — Production Docker Compose
# Full stack: Next.js + FastAPI + PostgreSQL + Redis + Nginx
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: carsi-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carsi-prod

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    container_name: carsi-web
    expose:
      - '3000'
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carsi-prod

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: carsi-backend
    expose:
      - '8000'
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://carsi_user:${POSTGRES_PASSWORD}@postgres:5432/carsi_prod
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - carsi-prod

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    container_name: carsi-postgres-prod
    environment:
      POSTGRES_DB: carsi_prod
      POSTGRES_USER: carsi_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carsi_user -d carsi_prod']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - carsi-prod

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: carsi-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - carsi-prod

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  carsi-prod:
    driver: bridge
