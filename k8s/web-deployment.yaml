apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsi-web
  namespace: carsi-production
  labels:
    app: carsi-web
    app.kubernetes.io/part-of: carsi-lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carsi-web
  template:
    metadata:
      labels:
        app: carsi-web
    spec:
      containers:
        - name: web
          image: ghcr.io/carsi-lms/web:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: carsi-config
            - secretRef:
                name: carsi-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carsi-web-hpa
  namespace: carsi-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carsi-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
