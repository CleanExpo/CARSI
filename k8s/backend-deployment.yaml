apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsi-backend
  namespace: carsi-production
  labels:
    app: carsi-backend
    app.kubernetes.io/part-of: carsi-lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carsi-backend
  template:
    metadata:
      labels:
        app: carsi-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/carsi-lms/backend:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: carsi-config
            - secretRef:
                name: carsi-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carsi-backend-hpa
  namespace: carsi-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carsi-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
