apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: carsi-production
  labels:
    app: carsi-postgres
    app.kubernetes.io/part-of: carsi-lms
spec:
  serviceName: carsi-postgres
  replicas: 1
  selector:
    matchLabels:
      app: carsi-postgres
  template:
    metadata:
      labels:
        app: carsi-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: carsi_prod
            - name: POSTGRES_USER
              value: carsi_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carsi-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - carsi_user
                - -d
                - carsi_prod
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - carsi_user
                - -d
                - carsi_prod
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 20Gi
