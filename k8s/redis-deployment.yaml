apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsi-redis
  namespace: carsi-production
  labels:
    app: carsi-redis
    app.kubernetes.io/part-of: carsi-lms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: carsi-redis
  template:
    metadata:
      labels:
        app: carsi-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          command:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
