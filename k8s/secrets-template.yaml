# CARSI LMS — Kubernetes Secrets Template
#
# This is a TEMPLATE only. Do not commit actual secret values.
#
# Usage:
#   1. Copy .env.prod.example to .env.prod
#   2. Fill in real values
#   3. Apply with:
#      kubectl create secret generic carsi-secrets \
#        --from-env-file=.env.prod \
#        -n carsi-production
#
# Alternatively, apply this template and patch values individually:
#   kubectl apply -f k8s/secrets-template.yaml
#   kubectl -n carsi-production patch secret carsi-secrets \
#     -p '{"stringData":{"JWT_SECRET_KEY":"your-real-secret"}}'

apiVersion: v1
kind: Secret
metadata:
  name: carsi-secrets
  namespace: carsi-production
  labels:
    app.kubernetes.io/part-of: carsi-lms
type: Opaque
stringData:
  # Database
  DATABASE_URL: 'postgresql://carsi_user:CHANGE_ME@carsi-postgres:5432/carsi_prod'
  POSTGRES_PASSWORD: 'CHANGE_ME'

  # Authentication
  JWT_SECRET_KEY: 'CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32'

  # Stripe (payments)
  STRIPE_SECRET_KEY: 'sk_live_CHANGE_ME'
  STRIPE_WEBHOOK_SECRET: 'whsec_CHANGE_ME'
  STRIPE_PRICE_ID: 'price_CHANGE_ME'

  # Google Drive (course content)
  GOOGLE_CLIENT_ID: 'CHANGE_ME.apps.googleusercontent.com'
  GOOGLE_CLIENT_SECRET: 'CHANGE_ME'
  GOOGLE_REFRESH_TOKEN: 'CHANGE_ME'

  # Email (SMTP)
  SMTP_HOST: 'smtp.example.com'
  SMTP_PORT: '587'
  SMTP_USER: 'CHANGE_ME'
  SMTP_PASSWORD: 'CHANGE_ME'
  EMAIL_FROM: 'noreply@carsi.com.au'

  # AI Provider (optional — defaults to Ollama in ConfigMap)
  # ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"
