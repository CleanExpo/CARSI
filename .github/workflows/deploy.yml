name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend Tests (pre-deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: starter_db
          POSTGRES_USER: starter_user
          POSTGRES_PASSWORD: local_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: apps/backend
        run: uv sync --extra dev

      - name: Run backend tests
        working-directory: apps/backend
        run: uv run pytest -q
        env:
          DATABASE_URL: postgresql://starter_user:local_dev_password@localhost:5432/starter_db

  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-tests
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to Fly.io
        working-directory: apps/backend
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: flyctl ssh console -a carsi-backend -C "cd /app && alembic upgrade head"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
