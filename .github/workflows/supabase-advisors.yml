name: Supabase Advisor Drift

# Guards against new Supabase SECURITY advisors silently appearing (#121) —
# e.g. a new `public` table created without RLS, which PostgREST + the public
# anon key would expose. Diffs live advisors against docs/security/
# advisor-baseline.json and fails on anything new.
#
# Setup (one-time, founder):
#   1. Repo Settings → Secrets → Actions → add SUPABASE_ACCESS_TOKEN
#      (1Password: Unite-Group-Infrastructure / SUPABASE_ACCESS_TOKEN).
#   2. Repo Settings → Variables → Actions → set SUPABASE_ADVISOR_CHECK = true.
# Until both are set, the job is skipped (no-op), so this never blocks CI.

on:
  schedule:
    # Weekly, Mondays 01:00 UTC (offset from the Sunday security scan)
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  advisor-drift:
    name: Supabase Advisor Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ vars.SUPABASE_ADVISOR_CHECK == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for new Supabase security advisors
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ofzafxvxobjggjisrbsa
        run: node scripts/check-supabase-advisors.mjs
