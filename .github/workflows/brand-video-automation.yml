name: Brand Video Automation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'HeyGen mode: agent or avatar'
        required: false
        default: 'agent'
      script_ids:
        description: 'Optional comma-separated script ids'
        required: false
        default: ''
  schedule:
    - cron: '17 18 * * 1'

permissions:
  contents: read

jobs:
  generate-brand-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
      HEYGEN_AVATAR_ID: ${{ secrets.HEYGEN_AVATAR_ID }}
      HEYGEN_VOICE_ID: ${{ secrets.HEYGEN_VOICE_ID }}
      BRAND_VIDEO_MODE: ${{ github.event.inputs.mode || 'agent' }}
      BRAND_VIDEO_IDS: ${{ github.event.inputs.script_ids || '' }}
      BRAND_VIDEO_OUTPUT_DIR: output/brand-video
      BRAND_VIDEO_POLL_TIMEOUT_MS: 1800000
      BRAND_VIDEO_POLL_INTERVAL_MS: 15000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Plan video jobs
        run: npm run video:brand:plan

      - name: Generate videos with HeyGen
        if: env.HEYGEN_API_KEY != ''
        run: npm run video:brand:generate

      - name: Upload video automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carsi-brand-video-automation
          path: output/brand-video
          if-no-files-found: error
