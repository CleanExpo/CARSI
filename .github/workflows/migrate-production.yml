name: Migrate production database

# Applies pending Prisma migrations to the production database. CARSI's runtime image is a pure
# Next standalone server (`node server.js`) that does NOT run `prisma migrate deploy` on deploy, so
# schema changes need this out-of-band runner.
#
# Triggers:
#  - push to main touching prisma/migrations/** → auto-apply after a schema PR merges
#  - manual (workflow_dispatch) → defaults to a SAFE dry-run (migrate status only); set apply=true
#    to actually deploy. Use the dry-run first to verify the connection + see pending migrations.
#
# Prod DATABASE_URL + DATABASE_CA_CERT are pulled from Vercel (project carsi-web) using VERCEL_TOKEN,
# then resolved to the app's exact SSL connection string via scripts/print-prod-database-url.ts.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply pending migrations (false = status/dry-run only)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'prisma/migrations/**'

concurrency:
  group: prod-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Gate with required reviewers by configuring a "production" environment in repo settings.
    environment: production
    env:
      # Non-secret — from .vercel (project carsi-web, team unite-group).
      VERCEL_ORG_ID: team_KMZACI5rIltoCRhAtGCXlxUf
      VERCEL_PROJECT_ID: prj_hIQAdXiHQGGec6nNKEGzn7SyMh9p
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Pull production env from Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@latest env pull .env --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Resolve production DATABASE_URL (with CA cert)
        run: |
          set -euo pipefail
          RESOLVED="$(npx tsx scripts/print-prod-database-url.ts)"
          if [ -z "$RESOLVED" ]; then echo "Failed to resolve DATABASE_URL"; exit 1; fi
          # Mask so the URL never prints in logs.
          echo "::add-mask::$RESOLVED"
          echo "DATABASE_URL=$RESOLVED" >> "$GITHUB_ENV"

      - name: Migration status (always — non-mutating)
        run: |
          echo "### Pending migrations (before)" >> "$GITHUB_STEP_SUMMARY"
          npx prisma migrate status 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true

      - name: Apply pending migrations
        if: ${{ github.event_name == 'push' || inputs.apply == true }}
        run: |
          echo "Applying pending migrations to production…"
          npx prisma migrate deploy
          echo "### Migrations applied ✅" >> "$GITHUB_STEP_SUMMARY"

      - name: Dry-run notice
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply != true }}
        run: echo "### Dry-run only — status shown above, no migrations applied. Re-run with apply=true to deploy." >> "$GITHUB_STEP_SUMMARY"
