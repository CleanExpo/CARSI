name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  dependency-verification:
    name: Dependency Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Check lockfile integrity
        run: |
          test -f package-lock.json || { echo "::error::package-lock.json missing"; exit 1; }
          echo "Lockfile present"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependencies
        run: |
          echo "Legacy scripts/verify.sh removed; skipping."
          echo ok | tee verify-output.log

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-verification-report
          path: verify-output.log
          retention-days: 30

  # backend-tests removed 2026-04-19 — CARSI has no apps/backend directory
  # (checked with `ls apps/` → not a monorepo). The old job referenced a
  # phantom path and failed every run, blocking e2e-tests + build via
  # their `needs:` entries. If a Python backend is added later, restore
  # this job with real paths.

  frontend-tests:
    name: Frontend Tests
    needs: [dependency-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Licence-critical: block copy that implies CARSI delivers IICRC
      # certification instead of IICRC CEC courses (Linear GP-451).
      - name: IICRC CEC terminology guard
        run: npm run check:iicrc-terminology

      - name: Australian-English course-content guard
        run: npm run check:au-english

      # Advisory course-completeness scorecard (assessment, thumbnail, intro
      # video, card metadata, scaffolds, depth). Non-blocking today; promote a
      # finalised series with --enforce=<slugs> once it is green.
      - name: Course completeness scorecard (advisory)
        run: npm run check:course-completeness

      # Licence-critical backstop: scans all course-content + marketing surfaces
      # (data/seed, public/courses, docs/marketing, docs/content) for stray IICRC
      # placements, banned "IICRC-approved"/"certified with CARSI" phrasing, and
      # unapproved specific CEC-hour claims. The systemic fix for the truckmount +
      # CEC-inference incidents.
      - name: IICRC / CEC compliance guard
        run: npm run check:iicrc-compliance

      # Licence-critical: validates data/seed/cec-approvals.json — the SSOT any displayed
      # CEC hours must come from. Slugs must exist in the catalog, approved hours are
      # whole numbers >= 1 and never exceed course educational hours (1 CEC = 1 contact
      # hour, iicrc.org). Fail-closed.
      - name: CEC approvals registry check
        run: npm run check:cec

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    needs: [dependency-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pure-logic vitest suite (no DB). Previously run by no workflow, so
      # security-relevant tests (jwt-secret strength, Postgres SSL-mode
      # normalization, rate-limit fallback) gated nothing. ~0.4s runtime.
      - name: Run unit tests
        run: npm run test:unit

  # WS5: enforce the secret scanner in CI (not just the bypassable local
  # pre-commit hook). Scans the whole tracked tree, so a committed live-looking
  # key fails the build even if the local hook was skipped. Dependency-free —
  # scripts/check-secrets.mjs only uses node + git, so no `npm ci` is needed.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Scan tracked tree for secrets
        run: node scripts/check-secrets.mjs --all

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests]

    # Postgres service + DATABASE_URL aligned to CARSI's schema (not the
    # starter_db leftover from the NodeJS Starter V1 template). Without
    # prisma migrate the webServer would query an empty schema and fail.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: carsi
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/carsi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to test DB
        run: npx prisma migrate deploy

      # Seed the course catalogue so the data-dependent journeys in
      # e2e/carsi-journeys.spec.ts (course list, WRT filter, "Carpet" search,
      # course detail by slug) run against real data instead of an empty DB.
      - name: Seed course catalogue for E2E
        run: npm run db:seed-courses

      # Seed the deterministic E2E student (student@carsi.com.au / student123) and
      # enrol them in the first catalogue course. Must run AFTER db:seed-courses so
      # the enrolled course exists. The auth.setup project logs in as this user to
      # mint a real session for the protected /dashboard journeys.
      - name: Seed E2E test user
        run: npx tsx scripts/seed-e2e-user.ts

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # GitHub-hosted runner images sometimes ship broken Microsoft apt sources
      # (packages.microsoft.com returns 403), which makes `apt-get update` fail
      # and breaks Playwright's --with-deps / install-deps. Drop those sources so
      # the remaining Ubuntu mirrors install Chromium's system deps cleanly.
      - name: Remove broken Microsoft apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/microsoft-prod.sources \
                     /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/azure-cli.sources || true

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # /prd, /workflows, /design-system, /agents are internal-tool routes that
          # middleware 302-redirects to "/" unless this is set. The PRD-generation
          # E2E journeys exercise /prd, so enable internal tools for the test run.
          INTERNAL_TOOLS_ENABLED: 'true'
          # The CI webServer runs a production build (`npm run start` → NODE_ENV=production),
          # where the JWT secret resolver THROWS unless JWT_SECRET is set to a strong
          # (>=32 char) value. The auth.setup project performs a real /api/auth/login that
          # signs/verifies the session JWT, so this must be present. Test-only value — do
          # NOT reuse in any real environment.
          JWT_SECRET: 'ci-e2e-test-only-jwt-secret-min-32-chars-1234567890'
          # DATABASE_URL inherited from job-level env (postgresql://root:root@localhost:5432/carsi).
          # The previous step-level starter_db override caused P1000 auth failure
          # because the postgres service uses root:root, not starter_user.

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/

  # accessibility-tests job removed — Playwright a11y specs lived under tests/ (deleted).
