name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

# This repo is a single-package Next.js 16 + Prisma app. The previous
# workflow was inherited from a multi-service template (apps/backend/
# Python, Playwright suites, type-check / test:e2e npm scripts) — none of
# which exist in this repo, so every run failed. The current matrix only
# runs what actually exists in package.json:
#   - npm ci   (lockfile + deps)
#   - npm run build  (= prisma generate && next build — does TS checking)
#
# Linting is intentionally skipped: Next.js 16 removed `next lint`, and the
# repo doesn't yet have an ESLint flat config at the root. Re-enable a lint
# job once ESLint is migrated. Same for E2E / accessibility tests — add
# them when Playwright is actually configured for this app.

jobs:
  dependency-verification:
    name: Dependency Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Check lockfile integrity
        run: |
          test -f package-lock.json || { echo "::error::package-lock.json missing"; exit 1; }
          echo "Lockfile present"

      - name: Install dependencies
        run: npm ci

  build:
    name: Build
    needs: [dependency-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `npm run build` = `prisma generate && next build`. next build
        # runs TypeScript checking internally, so this is the canonical
        # correctness gate for the app.
        run: npm run build
        env:
          # next build doesn't connect to the DB, but Prisma needs the env
          # var present to satisfy datasource resolution.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/
          retention-days: 7
