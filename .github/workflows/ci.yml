name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  dependency-verification:
    name: Dependency Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Check lockfile integrity
        run: |
          test -f package-lock.json || { echo "::error::package-lock.json missing"; exit 1; }
          echo "Lockfile present"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependencies
        run: |
          echo "Legacy scripts/verify.sh removed; skipping."
          echo ok | tee verify-output.log

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-verification-report
          path: verify-output.log
          retention-days: 30

  # backend-tests removed 2026-04-19 — CARSI has no apps/backend directory
  # (checked with `ls apps/` → not a monorepo). The old job referenced a
  # phantom path and failed every run, blocking e2e-tests + build via
  # their `needs:` entries. If a Python backend is added later, restore
  # this job with real paths.

  frontend-tests:
    name: Frontend Tests
    needs: [dependency-verification]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests]

    # Postgres service + DATABASE_URL aligned to CARSI's schema (not the
    # starter_db leftover from the NodeJS Starter V1 template). Without
    # prisma migrate the webServer would query an empty schema and fail.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: carsi
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/carsi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to test DB
        run: npx prisma migrate deploy

      # Seed the course catalogue so the data-dependent journeys in
      # e2e/carsi-journeys.spec.ts (course list, WRT filter, "Carpet" search,
      # course detail by slug) run against real data instead of an empty DB.
      - name: Seed course catalogue for E2E
        run: npm run db:seed-courses

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
          # DATABASE_URL inherited from job-level env (postgresql://root:root@localhost:5432/carsi).
          # The previous step-level starter_db override caused P1000 auth failure
          # because the postgres service uses root:root, not starter_user.

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests]

    # Postgres service: Playwright's webServer (Next dev) needs a reachable DB.
    # Without this DATABASE_URL fell through to the production DigitalOcean URL
    # which is unreachable from GitHub runners (P1001 ECONNREFUSED).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: carsi
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://root:root@localhost:5432/carsi

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations to test DB
        run: npx prisma migrate deploy

      - name: Cache Playwright browsers
        id: a11y-playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.a11y-playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.a11y-playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload accessibility test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-test-results
          path: test-results/
          retention-days: 30

      - name: Upload Playwright report (accessibility)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-playwright-report
          path: playwright-report/
          retention-days: 30
