name: Course intro videos

# Manual only. Renders course-intro videos: ElevenLabs voice (Phill McGurk) → HeyGen
# Phill avatar (audio-driven lip-sync) → Cloudinary, then writes introVideoUrl into the
# catalog. Secrets are GitHub Actions repo secrets (same set the media/brand-video
# workflows use), NOT a Vercel pull. Start with mode=dry-run, then generate with limit=1
# to validate the avatar + voice before batching.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run (free preview) or generate (spends credits)'
        type: choice
        options: [dry-run, generate]
        default: dry-run
      limit:
        description: 'Max videos to render this run (start at 1 to validate)'
        default: '1'
      slug:
        description: 'Optional single course slug (blank = all pending)'
        default: ''
      engine:
        description: 'HeyGen render engine (avatar_v = highest fidelity; avatar_iv allows expressiveness)'
        type: choice
        options: [avatar_v, avatar_iv, avatar_iii]
        default: avatar_v
      expressiveness:
        description: 'Face expressiveness — avatar_iv ONLY (HeyGen silently defaults to low)'
        type: choice
        options: [high, medium, low]
        default: high
      motion_prompt:
        description: 'Optional body/gesture direction (photo avatars)'
        default: ''

permissions:
  contents: write

env:
  HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
  HEYGEN_AVATAR_ID: ${{ secrets.HEYGEN_AVATAR_ID }}   # must resolve to the Phill McGurk avatar
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
  # face/expression quality — see scripts/generate-course-intro-videos.ts
  INTRO_VIDEO_ENGINE: ${{ inputs.engine }}
  INTRO_VIDEO_EXPRESSIVENESS: ${{ inputs.expressiveness }}
  INTRO_VIDEO_MOTION_PROMPT: ${{ inputs.motion_prompt }}

jobs:
  intro-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Preflight (generate only) — confirm secrets present
        if: ${{ inputs.mode == 'generate' }}
        run: |
          missing=0
          for k in HEYGEN_API_KEY HEYGEN_AVATAR_ID ELEVENLABS_API_KEY CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            if [ -z "${!k}" ]; then echo "::error::missing secret $k"; missing=1; fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Dry-run (no spend)
        if: ${{ inputs.mode == 'dry-run' }}
        run: npx tsx scripts/generate-course-intro-videos.ts --dry-run

      - name: Render intros + write introVideoUrl
        if: ${{ inputs.mode == 'generate' }}
        run: |
          SLUG_ARG=""
          if [ -n "${{ inputs.slug }}" ]; then SLUG_ARG="--slug=${{ inputs.slug }}"; fi
          npx tsx scripts/generate-course-intro-videos.ts --generate --yes $SLUG_ARG --limit=${{ inputs.limit }}
          npx tsx scripts/apply-intro-video-urls.ts

      # main is a protected branch (GH006 on direct push), so results land as a PR for review.
      - name: Open PR with rendered results
        if: ${{ inputs.mode == 'generate' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "carsi-ci"
          git config user.email "ci@carsi.local"
          git add data/seed/courses-catalog.json data/video/course-intro-video-results.json
          if git diff --cached --quiet; then
            echo "No changes to commit (nothing rendered)."
            exit 0
          fi
          BR="chore/intro-video-results-${{ github.run_id }}"
          git checkout -b "$BR"
          git commit -m "chore(intro-videos): rendered intros + introVideoUrl (engine=${{ inputs.engine }})"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "Course intro videos: rendered results (engine=${{ inputs.engine }})" \
            --body "Automated: rendered course-intro videos (ElevenLabs voice → HeyGen avatar) and wrote \`introVideoUrl\` into the catalog. Engine: \`${{ inputs.engine }}\`, expressiveness: \`${{ inputs.expressiveness }}\`. Review the linked Cloudinary URLs before merging." \
            || echo "PR may already exist for $BR"
