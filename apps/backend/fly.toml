# =============================================================================
# CARSI LMS — Fly.io Application Configuration
# App: carsi-backend
# Region: syd (Sydney, Australia)
# Machine: shared-cpu-1x 512MB RAM (~$3.83 AUD/month)
# =============================================================================

app = "carsi-backend"
primary_region = "syd"

# Build using the existing production Dockerfile
[build]
  dockerfile = "Dockerfile"

# Named process definitions
# Each process maps to a named machine group in Fly.io
# CELERY_BROKER_URL — set via: fly secrets set CELERY_BROKER_URL=redis://... --app carsi-backend
[processes]
  app    = "/app/.venv/bin/uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2"
  worker = "/app/.venv/bin/celery -A src.worker.celery_app worker --loglevel=info --concurrency=2 -Q celery"
  beat   = "/app/.venv/bin/celery -A src.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler"

# Static environment (non-secret) variables
# Secrets (DATABASE_URL, JWT_SECRET_KEY, STRIPE_*, SMTP_PASS, etc.) are set via:
#   fly secrets set KEY=VALUE --app carsi-backend
[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  AI_PROVIDER = "anthropic"
  CORS_ORIGINS = '["https://carsi.com.au","https://www.carsi.com.au","https://carsi-web.vercel.app","https://carsi-backend.fly.dev","https://api.carsi.com.au"]'

  # Email configuration (SMTP_PASS is a secret — set via fly secrets)
  SMTP_HOST = "smtp.resend.com"
  SMTP_PORT = "465"
  SMTP_USER = "resend"
  SMTP_FROM = "noreply@carsi.com.au"
  SMTP_FROM_NAME = "CARSI Learning"
  SMTP_USE_SSL = "true"
  SMTP_USE_TLS = "false"

# HTTP service configuration — bound to the "app" process only
[http_service]
  processes = ["app"]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Custom domain — api.carsi.com.au → carsi-backend.fly.dev
  # DNS: CNAME api.carsi.com.au → carsi-backend.fly.dev
  # Then run: flyctl certs create api.carsi.com.au --app carsi-backend
  [[http_service.custom_domains]]
    hostname = "api.carsi.com.au"

  # Health check — maps to FastAPI /health endpoint
  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"

# Machine sizes — per-process VM configuration
# app:    512MB — uvicorn handles HTTP traffic
# worker: 256MB — Celery task processing (concurrency=2)
# beat:   256MB — lightweight scheduler only (no task execution)

[[vm]]
  size = "shared-cpu-1x"
  processes = ["app"]
  memory_mb = 1024

[[vm]]
  size = "shared-cpu-1x"
  processes = ["worker"]
  memory_mb = 256

[[vm]]
  size = "shared-cpu-1x"
  processes = ["beat"]
  memory_mb = 256

# Deploy strategy: rolling (zero-downtime deploys)
# Release command runs migrations before new version goes live
[deploy]
  strategy = "rolling"
  release_command = "/app/.venv/bin/alembic -c /app/alembic.ini upgrade head"
